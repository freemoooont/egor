version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/iam"
    queries: "queries/iam"
    gen:
      go:
        package: "iamq"
        sql_package: "pgx/v5"
        out: "internal/infrastructure/postgres/queries/iam"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_db_tags: false
        emit_interface: false
  - engine: "postgresql"
    schema: "migrations/decks"
    queries: "queries/decks"
    gen:
      go:
        package: "decksq"
        sql_package: "pgx/v5"
        out: "internal/infrastructure/postgres/queries/decks"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_db_tags: false
        emit_interface: false
  - engine: "postgresql"
    schema: "migrations/practice"
    queries: "queries/practice"
    gen:
      go:
        package: "practiceq"
        sql_package: "pgx/v5"
        out: "internal/infrastructure/postgres/queries/practice"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_db_tags: false
        emit_interface: false
